<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eliezer Rufino Morales</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9749;</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #03050A;
      --bg2: #0B0E17;
      --text: #F0F2F5;
      --text2: #8892A4;
      --accent: #6C5CE7;
      --accent2: #A29BFE;
      --grad-accent: linear-gradient(135deg, #6C5CE7, #A29BFE);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(108,92,231,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108,92,231,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .glow-1 {
      position: fixed; width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(108,92,231,0.1) 0%, transparent 70%);
      top: -200px; right: -200px; z-index: 0;
      animation: float 8s ease-in-out infinite alternate;
    }
    .glow-2 {
      position: fixed; width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(253,203,110,0.05) 0%, transparent 70%);
      bottom: -200px; left: -200px; z-index: 0;
      animation: float 10s ease-in-out infinite alternate-reverse;
    }
    @keyframes float {
      0% { transform: translate(0,0) scale(1); }
      100% { transform: translate(40px,-40px) scale(1.1); }
    }
    .cursor-glow {
      position: fixed; width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(108,92,231,0.04) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
      transform: translate(-50%, -50%);
    }
    .container {
      position: relative; z-index: 1;
      text-align: center;
      max-width: 720px;
      padding: 40px 24px;
    }
    .badge {
      display: inline-block;
      background: rgba(108,92,231,0.12);
      border: 1px solid rgba(108,92,231,0.2);
      padding: 6px 20px; border-radius: 50px;
      font-size: 0.72rem; color: var(--accent2);
      letter-spacing: 3px; text-transform: uppercase;
      margin-bottom: 28px;
    }
    h1 {
      font-size: clamp(2.8rem, 8vw, 5rem);
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1.08;
      margin-bottom: 20px;
    }
    h1 .grad {
      background: linear-gradient(135deg, #6C5CE7 0%, #A29BFE 40%, #FDCB6E 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    h1 .outline {
      -webkit-text-fill-color: transparent;
      -webkit-text-stroke: 1.5px var(--text);
    }
    .desc {
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      color: var(--text2);
      max-width: 560px;
      margin: 0 auto 48px;
      line-height: 1.8;
    }
    .desc span {
      display: inline-block;
      background: rgba(255,255,255,0.04);
      padding: 4px 14px; border-radius: 20px;
      margin: 2px 3px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .social {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .social a {
      display: flex; align-items: center; justify-content: center;
      width: 52px; height: 52px;
      background: var(--bg2);
      border-radius: 14px;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.05);
      transition: border-color 0.3s, transform 0.3s, background 0.3s;
      font-size: 1.4rem;
    }
    .social a:hover {
      border-color: rgba(108,92,231,0.3);
      background: rgba(108,92,231,0.08);
      transform: translateY(-3px);
    }
    footer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1;
      padding: 24px;
      text-align: center;
    }
    footer p {
      color: var(--text2);
      font-size: 0.78rem;
    }
    footer .logo {
      font-size: 0.85rem;
      font-weight: 700;
      background: var(--grad-accent);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    @media (max-width: 600px) {
      .social a {
        width: 100%;
        justify-content: center;
      }
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="cursor-glow" id="cursorGlow"></div>

  <div class="container">
    <div class="badge">Creatividad &bull; Tecnolog&iacute;a &bull; Fe</div>
    <h1>
      Eliezer <span class="grad">Rufino</span><br>
      <span class="outline">Morales</span>
    </h1>
    <p class="desc">
      <span>Amante del Caf&eacute;</span>
      <span>Pianista</span>
      <span>Dise&ntilde;ador Gr&aacute;fico</span>
      <span>Digital Creator</span>
    </p>
    <div class="social">
      <a href="https://www.facebook.com/eliezer.rufino.morales.2025" target="_blank" title="Facebook">&#128214;</a>
      <a href="https://www.instagram.com/eliezer.pro" target="_blank" title="Instagram">&#128247;</a>
      <a href="https://github.com/eliezer-pro" target="_blank" title="GitHub">&#128187;</a>
      <a href="https://www.linkedin.com/in/eliezerpro/" target="_blank" title="LinkedIn">&#128188;</a>
      <a href="https://wa.me/18498162384" target="_blank" title="WhatsApp">&#128172;</a>
    </div>
  </div>

  <footer>
    <p><span class="logo">eliezer.pro</span> &copy; 2026 Eliezer Rufino Morales</p>
  </footer>

  <script>
    const cursor = document.getElementById('cursorGlow');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });
  </script>
</body>
</html>
