<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1.0">
  <title>Eliezer Rufino Morales</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9749;</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    :root {
      --bg: #03050A;
      --text: #F0F2F5;
      --text2: #8892A4;
      --accent: #6C5CE7;
      --accent2: #A29BFE;
      --cyan: #00E5FF;
      --grad-accent: linear-gradient(135deg, #6C5CE7, #A29BFE);
      --grad-cyber: linear-gradient(135deg, #00E5FF, #6C5CE7, #FDCB6E);
    }
    html { scroll-behavior: smooth; touch-action: manipulation; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .glow-1 {
      position: fixed; width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,255,0.08) 0%, transparent 70%);
      top: -200px; right: -200px; z-index: 0;
      animation: float 8s ease-in-out infinite alternate;
    }
    .glow-2 {
      position: fixed; width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(108,92,231,0.06) 0%, transparent 70%);
      bottom: -200px; left: -200px; z-index: 0;
      animation: float 10s ease-in-out infinite alternate-reverse;
    }
    @keyframes float {
      0% { transform: translate(0,0) scale(1); }
      100% { transform: translate(40px,-40px) scale(1.1); }
    }
    .container {
      position: relative; z-index: 1;
      text-align: center;
      max-width: 800px;
      padding: 40px 24px;
    }
    .cursor-line {
      display: inline-block;
      font-size: 0.75rem;
      color: var(--cyan);
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 24px;
      font-weight: 500;
      opacity: 0.7;
    }
    .cursor-line::after {
      content: '_';
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    h1 {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 20px;
      font-family: 'JetBrains Mono', monospace;
    }
    h1 .name {
      background: var(--grad-cyber);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 40px rgba(0,229,255,0.15);
    }
    h1 .last {
      color: var(--text);
      opacity: 0.6;
      font-weight: 300;
      letter-spacing: 8px;
      font-size: 0.7em;
      display: block;
      margin-top: 4px;
    }
    .bracket {
      color: var(--cyan);
      opacity: 0.4;
      font-weight: 300;
    }
    .desc {
      font-size: clamp(0.8rem, 1.8vw, 1rem);
      color: var(--text2);
      max-width: 600px;
      margin: 0 auto 48px;
      line-height: 2;
      font-weight: 400;
    }
    .desc span {
      display: inline-block;
      background: rgba(0,229,255,0.04);
      padding: 3px 12px;
      margin: 2px 3px;
      border: 1px solid rgba(0,229,255,0.08);
      font-size: 0.82rem;
    }
    .desc span::before {
      content: '<';
      color: var(--cyan);
      opacity: 0.4;
    }
    .desc span::after {
      content: '/>';
      color: var(--cyan);
      opacity: 0.4;
    }
    .social {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .social a {
      display: flex; align-items: center; justify-content: center;
      width: 52px; height: 52px;
      background: rgba(0,229,255,0.04);
      border-radius: 12px;
      text-decoration: none;
      border: 1px solid rgba(0,229,255,0.08);
      transition: border-color 0.3s, transform 0.3s, background 0.3s, box-shadow 0.3s;
      color: var(--text2);
    }
    .social a:hover {
      border-color: var(--cyan);
      background: rgba(0,229,255,0.08);
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 30px rgba(0,229,255,0.12);
      color: var(--cyan);
    }
    footer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1;
      padding: 20px;
      text-align: center;
    }
    footer p {
      color: var(--text2);
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    footer .logo {
      font-weight: 700;
      background: var(--grad-cyber);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    @media (max-width: 600px) {
      .social a {
        width: 48px; height: 48px;
      }
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 2px; }
  </style>
</head>
